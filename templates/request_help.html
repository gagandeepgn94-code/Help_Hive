<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Emergency Help Request</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"

<script>

async function getAddress(lat, lon) {

    try {

        const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
        );

        const data = await response.json();

        document.getElementById("address").value =
            data.display_name;

        document.getElementById("addressDisplay").value =
            data.display_name;

    }

    catch(error){

        console.log(error);

    }

}

navigator.geolocation.getCurrentPosition(

function(position){

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lon;

    getAddress(lat, lon);

},

function(error){

    alert("Location access is required.");

}

);

</script>

<style>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="container">

<div class="title">

<h1>
Emergency Help Request
</h1>

<p>
Request immediate support from nearby volunteers
</p>

</div>

<form action="/request_help" method="POST">

    
<!-- NAME -->

<div class="input-box">

<label>Your Name</label>

<input
type="text"
name="name"
placeholder="Enter your name"
required>

</div>

<!-- CATEGORY -->

<div class="input-box">

<label>Emergency Category</label>

<select name="category" required>

<option value="">Choose Category</option>

<option value="Doctor">🏥 Doctor Assistance</option>

<option value="Nurse">💉 Nurse Support</option>

<option value="Blood Donor">🩸 Blood Donor Needed</option>

<option value="Fire Rescue">🔥 Fire Rescue</option>

<option value="Ambulance">🚑 Ambulance Support</option>

<option value="NGO Support">🤝 NGO Support</option>

<option value="Disaster Response">🌪 Disaster Response</option>

</select>

</div>

<!-- DESCRIPTION -->

<div class="input-box">

<label>Emergency Description</label>

<textarea
name="help"
placeholder="Describe your emergency"
required></textarea>

</div>

<!-- PRIORITY -->

<div class="input-box">

<label>Priority</label>

<select name="priority">

<option value="High">🔴 High</option>

<option value="Medium">🟠 Medium</option>

<option value="Low">🔵 Low</option>

</select>

</div>

<!-- HIDDEN LOCATION DATA -->

<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">
<input type="hidden" name="address" id="address">

<!-- LOCATION CARD -->

<div class="location-card">

    <div class="location-title">
        <i class="fa-solid fa-location-dot"></i>
        Current Location
    </div>

    <div id="locationText" class="location-text">
        Detecting your location...
    </div>

    <div class="location-status">
        <i class="fa-solid fa-circle-check"></i>
        Verified Location
    </div>

    <button
        type="button"
        class="location-btn"
        onclick="getLocation()">

        <i class="fa-solid fa-crosshairs"></i>
        Refresh Location

    </button>

</div>

<!-- SUBMIT BUTTON -->

<button
type="submit"
class="submit-btn">

<i class="fa-solid fa-paper-plane"></i>

Send Emergency Request

</button>

<style>

.location-card{

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.08);

.location-title{

display:flex;

align-items:center;

gap:10px;

font-size:18px;

font-weight:700;

margin-bottom:14px;

color:#8b5cf6;

}

.location-text{

color:#e2e8f0;

line-height:1.7;

font-size:15px;

margin-bottom:15px;

word-break:break-word;

}

.location-status{

display:inline-flex;

align-items:center;

gap:8px;

padding:8px 14px;

.location-btn{

width:100%;

padding:15px;

border:none;

border-radius:16px;

135deg,
#14b8a6,
#9333ea
);

font-weight:600;

cursor:pointer;

transition:.3s;

}

<script>

async function getLocation(){

    const locationText =
    document.getElementById("locationText");

    locationText.innerHTML =
    "Detecting location...";

    if(!navigator.geolocation){

        locationText.innerHTML =
        "Geolocation not supported";

        return;

    }

    navigator.geolocation.getCurrentPosition(

        async function(position){

            const lat =
            position.coords.latitude;

            const lon =
            position.coords.longitude;

            document.getElementById("latitude").value =
            lat;

            document.getElementById("longitude").value =
            lon;

            try{

                const response =
                await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                );

                const data =
                await response.json();

                const address =
                data.display_name ||
                "Address not found";

                document.getElementById("address").value =
                address;

                locationText.innerHTML =
                address;

            }

            catch(error){

                console.error(error);

                locationText.innerHTML =
                `Latitude: ${lat}<br>
                 Longitude: ${lon}`;

            }

        },

        function(error){

            locationText.innerHTML =
            "Location permission denied";

            console.error(error);

        }

    );

}

document.addEventListener(
"DOMContentLoaded",
getLocation
);

</script>
